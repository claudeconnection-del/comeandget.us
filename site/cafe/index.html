<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Byte Café · a cozy CTF playground</title>
  <meta name="description" content="A friendly little capture-the-flag playground in a cozy terminal. Decode, dig, and sip.">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#191724">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="cafe.css">
</head>
<body>
  <main class="window" aria-label="Byte Café terminal">
    <header class="titlebar">
      <span class="lights" aria-hidden="true"><span class="lt r"></span><span class="lt y"></span><span class="lt g"></span></span>
      <span class="title">byte café — playground — zsh</span>
      <button class="themebtn" id="themebtn" type="button" aria-label="Toggle light and dark mode" title="Toggle theme">☾</button>
    </header>
    <div class="console" id="console">
      <pre class="term" id="term" role="log" aria-live="polite"><span class="welcome">welcome to byte café</span> ☕  — a cozy little capture-the-flag playground.
brew something warm, settle in. nothing here bites.

type <span class="kbd">help</span> to see what you can do, or <span class="kbd">ls</span> to browse the challenges.</pre>
      <form class="cmdline" id="cmdline" autocomplete="off">
        <label class="sr-only" for="cmd">terminal command</label>
        <span class="ps" aria-hidden="true">~ %</span>
        <input id="cmd" name="cmd" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send">
        <button type="submit" class="sr-only">run</button>
      </form>
    </div>
  </main>
  <noscript><p class="noscript">Byte Café needs JavaScript for the terminal. Enable it and pop back in. ☕</p></noscript>
  <script type="module" src="js/app.js"></script>
</body>
</html>
